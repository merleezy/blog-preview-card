<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="card-body">
        <img
          src="assets/images/illustration-article.svg"
          alt="Abstract illustration image"
          class="card-image"
        />

        <p class="card-tag">Learning</p>

        <time class="card-date" datetime="2023-12-21"
          >Published 21 Dec 2023</time
        >

        <h1 class="card-title">HTML & CSS foundations</h1>

        <p class="card-content">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>

        <section class="card-author-section">
          <img
            src="assets/images/image-avatar.webp"
            alt="Profile image of the blog's author"
            class="card-author-image"
          />
          <p class="card-author">Greg Hooper</p>
        </section>
      </section>
    </main>
  </body>
</html>
